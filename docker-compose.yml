services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: comunidad
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d comunidad']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./src/backend
    restart: unless-stopped
    environment:
      PORT: '3000'
      DATABASE_URL: postgresql://postgres:postgres@db:5432/comunidad
      JWT_SECRET: ${JWT_SECRET:-cambiar-por-secreto-seguro-en-produccion}
      JWT_EXPIRES_IN: 7d
      EMAIL_HOST: smtp.ethereal.email
      EMAIL_PORT: '587'
      EMAIL_USER: ''
      EMAIL_PASS: ''
      SEED_DB: 'false'
      QUEUE_ENABLED: ${QUEUE_ENABLED:-true}
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'

  frontend:
    build: ./src/frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - backend

volumes:
  pgdata:
